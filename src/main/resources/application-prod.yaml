logging:
  level:
    root: INFO
    org.quartz: DEBUG

myth-cloth-market-service:
  crawler:
    jobs:
      - key: "NIN_NIN_GAME"
        name: "Nin Nin Game Crawler"
        cron: ${NIN_NIN_GAME_CRON:0 0 12 * * ?}
        enabled: true

      - key: "BBTS"
        name: "Big Bad Toy Store Crawler"
        cron: ${BBTS_CRON:0 0 12 * * ?}
        enabled: true
