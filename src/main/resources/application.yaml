management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

myth-cloth-market-service:

server:
  servlet:
    context-path: /api/v1

spring:
  application:
    name: myth-cloth-market-service
  rabbitmq:
    port: 5672
    virtual-host: /
    connection-timeout: 10000
    listener:
      simple:
        default-requeue-rejected: false
        acknowledge-mode: AUTO
  quartz:
    properties:
      org:
        quartz:
          scheduler:
            instanceName: MythClothMarketServiceScheduler
            instanceId: AUTO
          threadPool:
            threadCount: 5
